name: Generate Signal Snake

# Regenerates the brand-colored contribution "snake" animation used in
# section 08 (Live Telemetry) of README.md, and publishes it to the
# `output` branch so the README can reference a stable raw URL.

on:
  schedule:
    - cron: "0 0 * * *"     # once a day at midnight UTC
  workflow_dispatch: {}      # allow manual "Run workflow" from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate the Creato4-branded contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Prince-Tagadiya
          # single branded output: dark-green trace, gold "highest activity" glow
          outputs: |
            dist/creato4-signal-snake.svg?color_snake=F5E6CA&color_dots=0F2612,1D4623,2E5F35,4C8752,E3B34A
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snake SVG to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
