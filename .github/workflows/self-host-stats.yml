name: Self-Host Stat Cards (optional reliability upgrade)

# README.md embeds the GitHub Stats / Top Languages / Streak cards from their
# live public endpoints by default, so the profile works with zero setup.
# Those public endpoints are best-effort and can occasionally rate-limit.
# This workflow is an OPTIONAL upgrade: it bakes the same three cards into
# static SVGs committed to this repo, so they never depend on a third-party
# server being up. See SETUP.md for how to switch README.md over to them.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - ".github/workflows/self-host-stats.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >-
            username=Prince-Tagadiya&show_icons=true&include_all_commits=true&count_private=true&bg_color=0F2612&title_color=E3B34A&icon_color=F0C669&text_color=C9BA92&border_color=2E5F35&border_radius=14
          path: assets/generated/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >-
            username=Prince-Tagadiya&layout=compact&langs_count=8&bg_color=0F2612&title_color=E3B34A&text_color=C9BA92&border_color=2E5F35&border_radius=14
          path: assets/generated/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >-
            user=Prince-Tagadiya&background=0F2612&border=2E5F35&stroke=2E5F35&ring=E3B34A&fire=F0C669&currStreakNum=F5E6CA&sideNums=F5E6CA&currStreakLabel=E3B34A&sideLabels=C9BA92&dates=C9BA92&border_radius=14
          path: assets/generated/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/generated/*.svg
          git commit -m "Update self-hosted stat cards" || exit 0
          git push
