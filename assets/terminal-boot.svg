<svg width="640" height="340" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340">
  <defs>
    <!-- Terminal body gradient — 3D surface -->
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141E16"/>
      <stop offset="50%" stop-color="#0D1710"/>
      <stop offset="100%" stop-color="#0A120C"/>
    </linearGradient>

    <!-- Title bar gradient -->
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3424"/>
      <stop offset="100%" stop-color="#152A1A"/>
    </linearGradient>

    <!-- Reflection gradient (3D glass feel on top) -->
    <linearGradient id="reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow for 3D terminal -->
    <filter id="termShadow" x="-5%" y="-3%" width="110%" height="115%">
      <feDropShadow dx="5" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner shadow for inset screen -->
    <filter id="screenInset" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Scanline overlay pattern -->
    <pattern id="scanlines" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000" opacity="0.04"/>
    </pattern>

    <!-- Cursor blink -->
    <style>
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      @keyframes screenOn { from { opacity:0; } to { opacity:1; } }
      .cursor { animation: blink 1s step-end infinite; }
      .line { opacity: 0; }
      .l1 { animation: screenOn 0.1s 0.5s forwards; }
      .l2 { animation: screenOn 0.1s 1.2s forwards; }
      .l3 { animation: screenOn 0.1s 1.9s forwards; }
      .l4 { animation: screenOn 0.1s 2.6s forwards; }
      .l5 { animation: screenOn 0.1s 3.3s forwards; }
      .l6 { animation: screenOn 0.1s 4.0s forwards; }
      .l7 { animation: screenOn 0.1s 4.7s forwards; }
      .l8 { animation: screenOn 0.1s 5.4s forwards; }
      .mono { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; font-size: 12px; }
    </style>
  </defs>

  <!-- ——— 3D TERMINAL WINDOW ——— -->
  <g filter="url(#termShadow)">
    <!-- Terminal body with rounded corners -->
    <rect x="30" y="20" width="580" height="300" rx="12" ry="12" fill="url(#termBg)" stroke="#1D4623" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="30" y="20" width="580" height="36" rx="12" ry="0" fill="url(#titleBar)"/>
    <rect x="30" y="44" width="580" height="12" fill="url(#titleBar)"/>

    <!-- Glass reflection on title bar -->
    <rect x="30" y="20" width="580" height="36" rx="12" ry="12" fill="url(#reflection)"/>

    <!-- Traffic light buttons (3D raised) -->
    <circle cx="55" cy="38" r="6" fill="#FF5F57" opacity="0.9"/>
    <circle cx="55" cy="38" r="4" fill="#FF5F57" opacity="0.6"/>
    <circle cx="55" cy="38" r="2" fill="#FFB3B0" opacity="0.4"/>

    <circle cx="77" cy="38" r="6" fill="#FEBC2E" opacity="0.9"/>
    <circle cx="77" cy="38" r="4" fill="#FEBC2E" opacity="0.6"/>
    <circle cx="77" cy="38" r="2" fill="#FEE0A0" opacity="0.4"/>

    <circle cx="99" cy="38" r="6" fill="#28C840" opacity="0.9"/>
    <circle cx="99" cy="38" r="4" fill="#28C840" opacity="0.6"/>
    <circle cx="99" cy="38" r="2" fill="#8DEF9D" opacity="0.4"/>

    <!-- Title bar text -->
    <text x="320" y="42" text-anchor="middle" fill="#708068" class="mono" font-size="11" opacity="0.7">prince@creato4-lab : ~</text>

    <!-- Screen area (inset 3D) -->
    <rect x="38" y="58" width="564" height="254" rx="4" fill="#080F0B" filter="url(#screenInset)"/>

    <!-- Scanline overlay -->
    <rect x="38" y="58" width="564" height="254" rx="4" fill="url(#scanlines)"/>

    <!-- ——— TERMINAL CONTENT ——— -->
    <!-- Prompt line -->
    <g class="line l1">
      <text x="52" y="84" class="mono" fill="#4C8752">$</text>
      <text x="64" y="84" class="mono" fill="#E8DCC8">./init_creato4_lab.sh</text>
    </g>

    <g class="line l2">
      <text x="52" y="110" class="mono" fill="#4C8752" opacity="0.6">▸</text>
      <text x="66" y="110" class="mono" fill="#708068">loading embedded-systems ........</text>
      <text x="330" y="110" class="mono" fill="#4C8752">[ OK ]</text>
    </g>

    <g class="line l3">
      <text x="52" y="134" class="mono" fill="#4C8752" opacity="0.6">▸</text>
      <text x="66" y="134" class="mono" fill="#708068">loading iot-signal-processing .....</text>
      <text x="330" y="134" class="mono" fill="#4C8752">[ OK ]</text>
    </g>

    <g class="line l4">
      <text x="52" y="158" class="mono" fill="#4C8752" opacity="0.6">▸</text>
      <text x="66" y="158" class="mono" fill="#708068">loading applied-ai-engine ........</text>
      <text x="330" y="158" class="mono" fill="#4C8752">[ OK ]</text>
    </g>

    <g class="line l5">
      <text x="52" y="182" class="mono" fill="#4C8752" opacity="0.6">▸</text>
      <text x="66" y="182" class="mono" fill="#708068">loading fullstack-interface ......</text>
      <text x="330" y="182" class="mono" fill="#4C8752">[ OK ]</text>
    </g>

    <g class="line l6">
      <text x="52" y="216" class="mono" fill="#C49A3C" font-weight="bold">founder</text>
      <text x="108" y="216" class="mono" fill="#708068"> : </text>
      <text x="130" y="216" class="mono" fill="#E8DCC8">Prince Tagadiya</text>
    </g>

    <g class="line l7">
      <text x="52" y="240" class="mono" fill="#C49A3C" font-weight="bold">team</text>
      <text x="90" y="240" class="mono" fill="#708068">    : </text>
      <text x="130" y="240" class="mono" fill="#E8DCC8">Creato4 Lab  ·  4 engineers</text>
    </g>

    <g class="line l8">
      <text x="52" y="270" class="mono" fill="#C49A3C" font-weight="bold">status</text>
      <text x="102" y="270" class="mono" fill="#708068">  : </text>
      <text x="130" y="270" class="mono" fill="#4C8752" font-weight="bold">ONLINE</text>
      <text x="184" y="270" class="mono" fill="#708068"> — building real hardware</text>
      <rect x="430" y="260" width="8" height="14" fill="#4C8752" class="cursor" opacity="0.8"/>
    </g>
  </g>

  <!-- Bottom reflection (3D floor) -->
  <rect x="40" y="322" width="560" height="8" rx="4" fill="#0D1710" opacity="0.3"/>
  <rect x="60" y="327" width="520" height="4" rx="2" fill="#0A120C" opacity="0.15"/>
</svg>
