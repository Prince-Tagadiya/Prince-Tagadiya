<svg width="480" height="380" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380">
  <defs>
    <linearGradient id="bgColl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080F0B"/>
      <stop offset="100%" stop-color="#0E1E14"/>
    </linearGradient>

    <!-- Central orb gradient -->
    <radialGradient id="coreOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C49A3C" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#1D4623" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0E1E14" stop-opacity="0"/>
    </radialGradient>

    <!-- 3D card gradient -->
    <linearGradient id="card3d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3225"/>
      <stop offset="100%" stop-color="#0F2218"/>
    </linearGradient>

    <!-- Card glow -->
    <filter id="cardGlow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Connection line glow -->
    <filter id="connGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.45  0 0 0 0 0.18  0 0 0 0.5 0"/>
    </filter>

    <!-- Core number glow -->
    <filter id="numGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.77  0 0 0 0 0.6  0 0 0 0 0.23  0 0 0 0.4 0" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orbit ring -->
    <filter id="orbitGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>

    <style>
      @keyframes orbitSpin { 0% { stroke-dashoffset:600; } 100% { stroke-dashoffset:0; } }
      @keyframes pulse4 { 0%,100% { opacity:0.7; transform:scale(1); } 50% { opacity:1; transform:scale(1.05); } }
      @keyframes cardFloat1 { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
      @keyframes cardFloat2 { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
      @keyframes cardFloat3 { 0%,100% { transform:translateY(-3px); } 50% { transform:translateY(3px); } }
      @keyframes cardFloat4 { 0%,100% { transform:translateY(-2px); } 50% { transform:translateY(4px); } }
      @keyframes dataFlow { 0% { stroke-dashoffset:20; } 100% { stroke-dashoffset:0; } }
      .cardTxt { font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
      .cf1 { animation: cardFloat1 4s ease-in-out infinite; }
      .cf2 { animation: cardFloat2 4.5s ease-in-out 0.3s infinite; }
      .cf3 { animation: cardFloat3 5s ease-in-out 0.6s infinite; }
      .cf4 { animation: cardFloat4 3.5s ease-in-out 0.9s infinite; }
      .pulse4 { animation: pulse4 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="380" fill="url(#bgColl)" rx="8"/>

  <!-- Central glow orb -->
  <circle cx="240" cy="190" r="100" fill="url(#coreOrb)"/>

  <!-- Orbit rings (3D ellipses for perspective) -->
  <ellipse cx="240" cy="190" rx="95" ry="75" fill="none" stroke="#1D4623" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,6" filter="url(#orbitGlow)">
    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="240" cy="190" rx="120" ry="95" fill="none" stroke="#1D4623" stroke-width="0.4" opacity="0.15" stroke-dasharray="3,8" filter="url(#orbitGlow)">
    <animate attributeName="stroke-dashoffset" from="0" to="800" dur="30s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Connection lines from center to cards with glow -->
  <g filter="url(#connGlow)">
    <line x1="240" y1="190" x2="100" y2="80" stroke="#2E5F35" stroke-width="1" opacity="0.4" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="240" y1="190" x2="380" y2="80" stroke="#2E5F35" stroke-width="1" opacity="0.4" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="240" y1="190" x2="100" y2="310" stroke="#2E5F35" stroke-width="1" opacity="0.4" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="240" y1="190" x2="380" y2="310" stroke="#2E5F35" stroke-width="1" opacity="0.4" stroke-dasharray="4,3">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ——— CENTER "4" ——— -->
  <g class="pulse4" filter="url(#numGlow)">
    <circle cx="240" cy="190" r="28" fill="#152A1A" stroke="#C49A3C" stroke-width="1.5"/>
    <circle cx="240" cy="190" r="20" fill="#0E1E14" stroke="#C49A3C" stroke-width="0.5" opacity="0.5"/>
    <text x="240" y="198" text-anchor="middle" fill="#C49A3C" font-size="28" font-weight="800" font-family="'Segoe UI',sans-serif">4</text>
  </g>

  <!-- ——— MEMBER CARDS (3D floating) ——— -->

  <!-- PRINCE — Top Left -->
  <g class="cf1" filter="url(#cardGlow)">
    <rect x="32" y="38" width="130" height="68" rx="8" fill="url(#card3d)" stroke="#2E5F35" stroke-width="0.8"/>
    <rect x="32" y="38" width="130" height="20" rx="8" fill="#1D4623" opacity="0.5"/>
    <rect x="32" y="50" width="130" height="8" fill="#1D4623" opacity="0.5"/>
    <!-- Star indicator -->
    <text x="42" y="52" fill="#C49A3C" font-size="9">⭐</text>
    <text x="56" y="52" class="cardTxt" fill="#C49A3C" font-size="8" font-weight="600" opacity="0.7">FOUNDER</text>
    <!-- Name -->
    <text x="97" y="74" text-anchor="middle" class="cardTxt" fill="#E8DCC8" font-size="11" font-weight="700">Prince</text>
    <!-- Role -->
    <text x="97" y="90" text-anchor="middle" class="cardTxt" fill="#708068" font-size="8">Embedded · IoT · CEO</text>
    <!-- Bottom highlight line -->
    <line x1="52" y1="98" x2="142" y2="98" stroke="#C49A3C" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- RUDRA — Top Right -->
  <g class="cf2" filter="url(#cardGlow)">
    <rect x="318" y="38" width="130" height="68" rx="8" fill="url(#card3d)" stroke="#2E5F35" stroke-width="0.8"/>
    <rect x="318" y="38" width="130" height="20" rx="8" fill="#1D4623" opacity="0.5"/>
    <rect x="318" y="50" width="130" height="8" fill="#1D4623" opacity="0.5"/>
    <text x="328" y="52" class="cardTxt" fill="#4C8752" font-size="8" font-weight="600" opacity="0.7">SOFTWARE</text>
    <text x="383" y="74" text-anchor="middle" class="cardTxt" fill="#E8DCC8" font-size="11" font-weight="700">Rudra</text>
    <text x="383" y="90" text-anchor="middle" class="cardTxt" fill="#708068" font-size="8">Apps · Web · AI · Cloud</text>
    <line x1="338" y1="98" x2="428" y2="98" stroke="#4C8752" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- NISARG — Bottom Left -->
  <g class="cf3" filter="url(#cardGlow)">
    <rect x="32" y="268" width="130" height="68" rx="8" fill="url(#card3d)" stroke="#2E5F35" stroke-width="0.8"/>
    <rect x="32" y="268" width="130" height="20" rx="8" fill="#1D4623" opacity="0.5"/>
    <rect x="32" y="280" width="130" height="8" fill="#1D4623" opacity="0.5"/>
    <text x="42" y="282" class="cardTxt" fill="#4C8752" font-size="8" font-weight="600" opacity="0.7">HARDWARE</text>
    <text x="97" y="304" text-anchor="middle" class="cardTxt" fill="#E8DCC8" font-size="11" font-weight="700">Nisarg</text>
    <text x="97" y="320" text-anchor="middle" class="cardTxt" fill="#708068" font-size="8">PCB · Electronics</text>
    <line x1="52" y1="328" x2="142" y2="328" stroke="#4C8752" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- KHUSHI — Bottom Right -->
  <g class="cf4" filter="url(#cardGlow)">
    <rect x="318" y="268" width="130" height="68" rx="8" fill="url(#card3d)" stroke="#2E5F35" stroke-width="0.8"/>
    <rect x="318" y="268" width="130" height="20" rx="8" fill="#1D4623" opacity="0.5"/>
    <rect x="318" y="280" width="130" height="8" fill="#1D4623" opacity="0.5"/>
    <text x="328" y="282" class="cardTxt" fill="#4C8752" font-size="8" font-weight="600" opacity="0.7">MECHANICAL</text>
    <text x="383" y="304" text-anchor="middle" class="cardTxt" fill="#E8DCC8" font-size="11" font-weight="700">Khushi</text>
    <text x="383" y="320" text-anchor="middle" class="cardTxt" fill="#708068" font-size="8">CAD · Prototyping · DFM</text>
    <line x1="338" y1="328" x2="428" y2="328" stroke="#4C8752" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Small data particles along connection lines -->
  <circle r="1.5" fill="#C49A3C" opacity="0.6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M240,190 L100,80"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#C49A3C" opacity="0.6">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M240,190 L380,80" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="1.5" fill="#4C8752" opacity="0.5">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M240,190 L100,310" begin="1s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle r="1.5" fill="#4C8752" opacity="0.5">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M240,190 L380,310" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
