<svg width="860" height="210" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 860 210">
  <defs>
    <!-- Background gradient: deep forest green -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A1810"/>
      <stop offset="50%"  stop-color="#1D4623"/>
      <stop offset="100%" stop-color="#2E5F35"/>
    </linearGradient>

    <!-- Wave path clip -->
    <clipPath id="wave-clip">
      <rect width="860" height="210"/>
    </clipPath>

    <!-- Fade-in animation -->
    <style>
      .name-text {
        font-size: 40px;
        font-weight: 700;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        fill: #F5E6CA;
        animation: fadeInUp 1.2s ease-out forwards;
        opacity: 0;
      }
      .desc-text {
        font-size: 15px;
        font-weight: 500;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        fill: #E3B34A;
        animation: fadeInUp 1.2s ease-out 0.4s forwards;
        opacity: 0;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
    </style>
  </defs>

  <!-- Background fill -->
  <rect width="860" height="210" fill="url(#bg)"/>

  <!-- Subtle grid lines for depth -->
  <g opacity="0.06" stroke="#F5E6CA" stroke-width="0.5">
    <line x1="0" y1="40"  x2="860" y2="40"/>
    <line x1="0" y1="80"  x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="210"/>
    <line x1="200" y1="0" x2="200" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="210"/>
    <line x1="400" y1="0" x2="400" y2="210"/>
    <line x1="500" y1="0" x2="500" y2="210"/>
    <line x1="600" y1="0" x2="600" y2="210"/>
    <line x1="700" y1="0" x2="700" y2="210"/>
    <line x1="800" y1="0" x2="800" y2="210"/>
  </g>

  <!-- Wave 1 (back layer) -->
  <path fill="#1D4623" opacity="0.35" clip-path="url(#wave-clip)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
      M0,140 C120,110 240,170 360,140 C480,110 600,170 720,140 C800,120 860,130 860,130 L860,210 L0,210 Z;
      M0,130 C120,160 240,110 360,145 C480,175 600,115 720,150 C800,170 860,140 860,140 L860,210 L0,210 Z;
      M0,140 C120,110 240,170 360,140 C480,110 600,170 720,140 C800,120 860,130 860,130 L860,210 L0,210 Z
    "/>
  </path>

  <!-- Wave 2 (front layer) -->
  <path fill="#0A1810" opacity="0.55" clip-path="url(#wave-clip)">
    <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
      M0,165 C140,140 280,185 430,160 C570,138 700,180 860,158 L860,210 L0,210 Z;
      M0,158 C140,180 280,145 430,168 C570,188 700,148 860,165 L860,210 L0,210 Z;
      M0,165 C140,140 280,185 430,160 C570,138 700,180 860,158 L860,210 L0,210 Z
    "/>
  </path>

  <!-- Gold accent line -->
  <line x1="180" y1="108" x2="680" y2="108" stroke="#E3B34A" stroke-width="0.6" opacity="0.4"/>

  <!-- Name text -->
  <text class="name-text" x="50%" y="78" text-anchor="middle" dominant-baseline="middle">PRINCE TAGADIYA</text>

  <!-- Description text -->
  <text class="desc-text" x="50%" y="105" text-anchor="middle" dominant-baseline="middle">Founder &amp; CEO, Creato4 · Embedded Systems &amp; Hardware Engineer</text>
</svg>
