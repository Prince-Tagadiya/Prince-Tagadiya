<svg width="900" height="230" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080F0B"/>
      <stop offset="40%" stop-color="#0E1E14"/>
      <stop offset="100%" stop-color="#132A1A"/>
    </linearGradient>

    <!-- 3D text shadow gradient -->
    <linearGradient id="textDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8A6B22"/>
    </linearGradient>

    <!-- Gold shimmer gradient -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C49A3C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F0D080" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C49A3C" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filter for 3D depth -->
    <filter id="glow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.4  0 0 0 0 0.15  0 0 0 0.5 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for 3D elements -->
    <filter id="shadow3d" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Soft inner glow -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.38  0 0 0 0 0.14  0 0 0 0.3 0"/>
    </filter>

    <!-- Hex pattern for tech feel -->
    <pattern id="hexGrid" width="28" height="48.5" patternUnits="userSpaceOnUse" patternTransform="scale(1.5)">
      <polygon points="14,2 26,9 26,23 14,30 2,23 2,9" fill="none" stroke="#1D4623" stroke-width="0.4" opacity="0.15"/>
      <polygon points="14,18.5 26,25.5 26,39.5 14,46.5 2,39.5 2,25.5" fill="none" stroke="#1D4623" stroke-width="0.4" opacity="0.08" transform="translate(14,0)"/>
    </pattern>

    <style>
      @keyframes float1 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes float3 { 0%,100% { transform: translateY(-4px); } 50% { transform: translateY(4px); } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }
      @keyframes particleDrift { 0% { transform: translateY(0) translateX(0); opacity:0; } 20% { opacity:0.6; } 80% { opacity:0.4; } 100% { transform: translateY(-40px) translateX(15px); opacity:0; } }
      @keyframes rotate3d { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .name { font-size:38px; font-weight:800; font-family:'Segoe UI',Helvetica,Arial,sans-serif; letter-spacing:4px; }
      .desc { font-size:13px; font-weight:400; font-family:'Segoe UI',Helvetica,Arial,sans-serif; letter-spacing:1.5px; }
      .float1 { animation: float1 5s ease-in-out infinite; }
      .float2 { animation: float2 4s ease-in-out 0.5s infinite; }
      .float3 { animation: float3 6s ease-in-out 1s infinite; }
      .fadeUp1 { animation: fadeUp 1s ease-out 0.2s both; }
      .fadeUp2 { animation: fadeUp 1s ease-out 0.6s both; }
      .fadeUp3 { animation: fadeUp 1s ease-out 1s both; }
      .particle { animation: particleDrift 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="900" height="230" fill="url(#bg)"/>

  <!-- Hex grid overlay for depth -->
  <rect width="900" height="230" fill="url(#hexGrid)" opacity="0.5"/>

  <!-- Ambient glow orbs for depth -->
  <ellipse cx="150" cy="115" rx="120" ry="80" filter="url(#softGlow)" fill="#2E5F35" opacity="0.15"/>
  <ellipse cx="750" cy="115" rx="100" ry="70" filter="url(#softGlow)" fill="#1D4623" opacity="0.12"/>

  <!-- 3D Floating isometric cubes — left side -->
  <g class="float1" filter="url(#shadow3d)" opacity="0.35">
    <g transform="translate(72,55)">
      <!-- Isometric cube -->
      <polygon points="0,-12 20,-2 20,18 0,8" fill="#2E5F35" opacity="0.8"/>
      <polygon points="0,-12 -20,-2 -20,18 0,8" fill="#1D4623" opacity="0.9"/>
      <polygon points="-20,-2 0,-12 20,-2 0,8" fill="#3D7A45" opacity="0.7"/>
    </g>
  </g>

  <!-- 3D Floating hexagon — right side -->
  <g class="float2" filter="url(#shadow3d)" opacity="0.3">
    <g transform="translate(810,65)">
      <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="none" stroke="#C49A3C" stroke-width="1.2"/>
      <polygon points="0,-10 9,-5 9,5 0,10 -9,5 -9,-5" fill="#C49A3C" opacity="0.1"/>
    </g>
  </g>

  <!-- 3D Floating diamond — center-left -->
  <g class="float3" filter="url(#shadow3d)" opacity="0.25">
    <g transform="translate(160,170)">
      <polygon points="0,-14 14,0 0,14 -14,0" fill="none" stroke="#3D7A45" stroke-width="1"/>
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#3D7A45" opacity="0.15"/>
    </g>
  </g>

  <!-- 3D Floating triangle — right area -->
  <g class="float1" filter="url(#shadow3d)" opacity="0.2">
    <g transform="translate(730,170)">
      <polygon points="0,-14 16,10 -16,10" fill="none" stroke="#C49A3C" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Small floating dots / particles -->
  <circle cx="200" cy="50" r="1.5" fill="#C49A3C" class="particle" opacity="0.5"/>
  <circle cx="350" cy="35" r="1" fill="#4C8752" class="particle" opacity="0.4" style="animation-delay:1s"/>
  <circle cx="550" cy="45" r="1.2" fill="#C49A3C" class="particle" opacity="0.35" style="animation-delay:2s"/>
  <circle cx="680" cy="55" r="1" fill="#4C8752" class="particle" opacity="0.4" style="animation-delay:0.5s"/>
  <circle cx="120" cy="80" r="0.8" fill="#C49A3C" class="particle" opacity="0.3" style="animation-delay:1.5s"/>
  <circle cx="800" cy="40" r="1.3" fill="#4C8752" class="particle" opacity="0.3" style="animation-delay:3s"/>
  <circle cx="450" cy="200" r="1" fill="#C49A3C" class="particle" opacity="0.25" style="animation-delay:2.5s"/>

  <!-- Horizontal perspective lines fading into distance -->
  <g opacity="0.06" stroke="#4C8752" stroke-width="0.5">
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="50" y1="205" x2="850" y2="205"/>
    <line x1="100" y1="215" x2="800" y2="215"/>
    <line x1="150" y1="222" x2="750" y2="222"/>
  </g>

  <!-- ——— 3D TITLE TEXT ——— -->
  <!-- Shadow/extrusion layers (3D depth) -->
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="#0A1810" opacity="0.5" dx="4" dy="5">PRINCE TAGADIYA</text>
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="#0F1A0F" opacity="0.35" dx="3" dy="3.5">PRINCE TAGADIYA</text>
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="#152915" opacity="0.25" dx="2" dy="2">PRINCE TAGADIYA</text>
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="#1D3D1D" opacity="0.15" dx="1" dy="1">PRINCE TAGADIYA</text>

  <!-- Main title text -->
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="#E8DCC8">PRINCE TAGADIYA</text>

  <!-- Gold shimmer overlay on text -->
  <text class="name fadeUp1" x="450" y="96" text-anchor="middle" fill="url(#goldShimmer)" opacity="0.3">PRINCE TAGADIYA</text>

  <!-- Accent underline with 3D glow -->
  <g class="fadeUp2" filter="url(#glow3d)">
    <line x1="280" y1="110" x2="620" y2="110" stroke="#C49A3C" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Subtitle -->
  <text class="desc fadeUp2" x="450" y="132" text-anchor="middle" fill="#A0997D" opacity="0.85">FOUNDER &amp; CEO, CREATO4</text>

  <!-- Second subtitle line -->
  <text class="desc fadeUp3" x="450" y="152" text-anchor="middle" fill="#708068" opacity="0.7" style="font-size:11px">EMBEDDED SYSTEMS &amp; HARDWARE ENGINEER  ·  IoT + AI INNOVATOR</text>

  <!-- Bottom edge glow line -->
  <rect x="0" y="226" width="900" height="4" fill="url(#bg)" opacity="0.8"/>
  <line x1="0" y1="228" x2="900" y2="228" stroke="#1D4623" stroke-width="1" opacity="0.3"/>
</svg>
