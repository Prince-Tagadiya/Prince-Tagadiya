<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060D08"/>
      <stop offset="35%" stop-color="#0B1A10"/>
      <stop offset="70%" stop-color="#0E2116"/>
      <stop offset="100%" stop-color="#0A1810"/>
    </linearGradient>
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C49A3C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F0D080" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C49A3C" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#1D4623" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B1A10" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C49A3C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C49A3C" stop-opacity="0"/>
    </radialGradient>
    <!-- Hex grid pattern -->
    <pattern id="hexGrid" width="30" height="52" patternUnits="userSpaceOnUse" patternTransform="scale(1.8)">
      <polygon points="15,2 28,9.5 28,24.5 15,32 2,24.5 2,9.5" fill="none" stroke="#1D4623" stroke-width="0.3" opacity="0.12"/>
      <polygon points="15,20 28,27.5 28,42.5 15,50 2,42.5 2,27.5" fill="none" stroke="#1D4623" stroke-width="0.3" opacity="0.06" transform="translate(15,0)"/>
    </pattern>
    <filter id="shadow3d" x="-15%" y="-15%" width="135%" height="145%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.38 0 0 0 0 0.14 0 0 0 0.4 0"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.77 0 0 0 0 0.6 0 0 0 0 0.23 0 0 0 0.25 0" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes float3{0%,100%{transform:translateY(-5px)}50%{transform:translateY(5px)}}
      @keyframes float4{0%,100%{transform:translateY(3px)}50%{transform:translateY(-8px)}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
      @keyframes drift{0%{transform:translateX(0) translateY(0)}25%{transform:translateX(6px) translateY(-4px)}50%{transform:translateX(0) translateY(-8px)}75%{transform:translateX(-6px) translateY(-4px)}100%{transform:translateX(0) translateY(0)}}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.35}}
      @keyframes particle{0%{transform:translateY(0) translateX(0);opacity:0}15%{opacity:.5}85%{opacity:.3}100%{transform:translateY(-50px) translateX(20px);opacity:0}}
      .f1{animation:float1 5s ease-in-out infinite}
      .f2{animation:float2 4.5s ease-in-out .4s infinite}
      .f3{animation:float3 6s ease-in-out .8s infinite}
      .f4{animation:float4 4s ease-in-out 1.2s infinite}
      .dr{animation:drift 8s ease-in-out infinite}
      .dr2{animation:drift 10s ease-in-out 2s infinite}
      .dr3{animation:drift 7s ease-in-out 4s infinite}
      .dr4{animation:drift 9s ease-in-out 1s infinite}
      .dr5{animation:drift 11s ease-in-out 3s infinite}
      .dr6{animation:drift 8s ease-in-out 5s infinite}
      .up1{animation:fadeUp 1s ease-out .2s both}
      .up2{animation:fadeUp 1s ease-out .6s both}
      .up3{animation:fadeUp 1s ease-out 1s both}
      .pls{animation:pulse 4s ease-in-out infinite}
      .pt{animation:particle 5s ease-in-out infinite}
      .name{font-size:42px;font-weight:800;font-family:'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:5px}
      .desc{font-size:13px;font-weight:400;font-family:'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:2px}
      .icon{font-family:'SF Mono','Fira Code','Consolas',monospace;font-weight:600}
    </style>
  </defs>

  <!-- Deep background -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#hexGrid)" opacity="0.6"/>

  <!-- Large ambient glow orbs -->
  <ellipse cx="450" cy="110" rx="200" ry="130" fill="url(#coreGlow)"/>
  <ellipse cx="150" cy="200" rx="120" ry="80" filter="url(#softGlow)" fill="#1D4623" opacity="0.08"/>
  <ellipse cx="780" cy="80" rx="100" ry="70" filter="url(#softGlow)" fill="#C49A3C" opacity="0.04"/>
  <circle cx="450" cy="120" r="90" fill="url(#goldOrb)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FLOATING TECH/SKILL ICONS IN BACKGROUND (3D)   -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Icon: Microchip (top-left area) -->
  <g class="dr" opacity="0.18" filter="url(#iconGlow)">
    <g transform="translate(78,52)">
      <rect x="-14" y="-14" width="28" height="28" rx="3" fill="none" stroke="#4C8752" stroke-width="1.2"/>
      <rect x="-7" y="-7" width="14" height="14" rx="1" fill="#1D4623" stroke="#4C8752" stroke-width="0.6"/>
      <!-- Pins -->
      <line x1="-14" y1="-7" x2="-20" y2="-7" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-14" y1="0" x2="-20" y2="0" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-14" y1="7" x2="-20" y2="7" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="14" y1="-7" x2="20" y2="-7" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="14" y1="0" x2="20" y2="0" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="14" y1="7" x2="20" y2="7" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-7" y1="-14" x2="-7" y2="-20" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="0" y1="-14" x2="0" y2="-20" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="7" y1="-14" x2="7" y2="-20" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-7" y1="14" x2="-7" y2="20" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="0" y1="14" x2="0" y2="20" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="7" y1="14" x2="7" y2="20" stroke="#4C8752" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Icon: Code brackets </> (top-right) -->
  <g class="dr2" opacity="0.2" filter="url(#iconGlow)">
    <g transform="translate(810,60)">
      <text x="0" y="0" text-anchor="middle" fill="#C49A3C" class="icon" font-size="22" opacity="0.7">&lt;/&gt;</text>
    </g>
  </g>

  <!-- Icon: Gear/cog (left-center) -->
  <g class="dr3" opacity="0.15">
    <g transform="translate(55,160)">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#4C8752" stroke-width="1" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#4C8752" stroke-width="0.8" opacity="0.5"/>
      <!-- Teeth -->
      <line x1="0" y1="-12" x2="0" y2="-17" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
      <line x1="10.4" y1="-6" x2="14.7" y2="-8.5" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
      <line x1="10.4" y1="6" x2="14.7" y2="8.5" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="12" x2="0" y2="17" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
      <line x1="-10.4" y1="6" x2="-14.7" y2="8.5" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
      <line x1="-10.4" y1="-6" x2="-14.7" y2="-8.5" stroke="#4C8752" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Icon: Wi-Fi waves (right-center) -->
  <g class="dr4" opacity="0.15" filter="url(#iconGlow)">
    <g transform="translate(840,165)">
      <circle cx="0" cy="5" r="2" fill="#C49A3C" opacity="0.6"/>
      <path d="M-7,-2 A10,10 0 0,1 7,-2" fill="none" stroke="#C49A3C" stroke-width="1" opacity="0.4"/>
      <path d="M-13,-7 A18,18 0 0,1 13,-7" fill="none" stroke="#C49A3C" stroke-width="0.8" opacity="0.3"/>
      <path d="M-19,-12 A26,26 0 0,1 19,-12" fill="none" stroke="#C49A3C" stroke-width="0.6" opacity="0.2"/>
    </g>
  </g>

  <!-- Icon: Circuit path (bottom-left) -->
  <g class="dr5" opacity="0.14">
    <g transform="translate(120,230)">
      <path d="M-25,0 H-10 L-5,-10 H10 L15,0 H25" fill="none" stroke="#4C8752" stroke-width="1"/>
      <circle cx="-10" cy="0" r="2" fill="#4C8752" opacity="0.5"/>
      <circle cx="10" cy="-10" r="2" fill="#C49A3C" opacity="0.4"/>
      <circle cx="25" cy="0" r="2" fill="#4C8752" opacity="0.5"/>
    </g>
  </g>

  <!-- Icon: Binary text (mid-right) -->
  <g class="dr6" opacity="0.12">
    <text x="790" y="240" class="icon" fill="#4C8752" font-size="9" opacity="0.5">01101</text>
    <text x="790" y="252" class="icon" fill="#4C8752" font-size="9" opacity="0.35">10010</text>
  </g>

  <!-- Icon: Curly braces { } (mid-left) -->
  <g class="dr4" opacity="0.16" filter="url(#iconGlow)">
    <text x="160" y="145" class="icon" fill="#C49A3C" font-size="20" opacity="0.4">{ }</text>
  </g>

  <!-- Icon: Resistor symbol (bottom-center-right) -->
  <g class="dr2" opacity="0.12">
    <g transform="translate(680,248)">
      <path d="M-20,0 H-14 L-11,-6 L-7,6 L-3,-6 L1,6 L5,-6 L9,6 L12,0 H20" fill="none" stroke="#4C8752" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Icon: Drone propeller (top-center-left) -->
  <g class="dr3" opacity="0.12" filter="url(#iconGlow)">
    <g transform="translate(280,45)">
      <circle cx="0" cy="0" r="3" fill="#4C8752" opacity="0.4"/>
      <ellipse cx="0" cy="-10" rx="3" ry="8" fill="none" stroke="#4C8752" stroke-width="0.7" transform="rotate(0,0,0)" opacity="0.4"/>
      <ellipse cx="0" cy="-10" rx="3" ry="8" fill="none" stroke="#4C8752" stroke-width="0.7" transform="rotate(90,0,0)" opacity="0.4"/>
      <ellipse cx="0" cy="-10" rx="3" ry="8" fill="none" stroke="#4C8752" stroke-width="0.7" transform="rotate(180,0,0)" opacity="0.4"/>
      <ellipse cx="0" cy="-10" rx="3" ry="8" fill="none" stroke="#4C8752" stroke-width="0.7" transform="rotate(270,0,0)" opacity="0.4"/>
    </g>
  </g>

  <!-- Icon: #include text (far-left bottom) -->
  <g class="dr" opacity="0.1">
    <text x="30" y="260" class="icon" fill="#4C8752" font-size="8">#include</text>
  </g>

  <!-- Icon: LED symbol (top right area) -->
  <g class="dr5" opacity="0.13">
    <g transform="translate(720,40)">
      <polygon points="0,-8 -7,6 7,6" fill="none" stroke="#C49A3C" stroke-width="0.8" opacity="0.5"/>
      <line x1="-7" y1="6" x2="7" y2="6" stroke="#C49A3C" stroke-width="0.8" opacity="0.5"/>
      <line x1="-4" y1="10" x2="-8" y2="14" stroke="#C49A3C" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="10" x2="-2" y2="15" stroke="#C49A3C" stroke-width="0.5" opacity="0.3"/>
    </g>
  </g>

  <!-- Icon: Capacitor symbol (bottom mid) -->
  <g class="dr6" opacity="0.11">
    <g transform="translate(380,260)">
      <line x1="-12" y1="0" x2="-3" y2="0" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-3" y1="-6" x2="-3" y2="6" stroke="#4C8752" stroke-width="1"/>
      <line x1="3" y1="-6" x2="3" y2="6" stroke="#4C8752" stroke-width="1"/>
      <line x1="3" y1="0" x2="12" y2="0" stroke="#4C8752" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Icon: Python-style >>>(bottom right) -->
  <g class="dr3" opacity="0.1">
    <text x="600" y="265" class="icon" fill="#C49A3C" font-size="9" opacity="0.4">&gt;&gt;&gt;</text>
  </g>

  <!-- Floating particles -->
  <circle cx="200" cy="50" r="1.2" fill="#C49A3C" class="pt" opacity="0.4"/>
  <circle cx="400" cy="30" r="1" fill="#4C8752" class="pt" style="animation-delay:1.2s"/>
  <circle cx="600" cy="55" r="1.3" fill="#C49A3C" class="pt" style="animation-delay:2.4s"/>
  <circle cx="140" cy="120" r="0.8" fill="#4C8752" class="pt" style="animation-delay:0.8s"/>
  <circle cx="750" cy="100" r="1" fill="#C49A3C" class="pt" style="animation-delay:1.8s"/>
  <circle cx="500" cy="240" r="0.9" fill="#4C8752" class="pt" style="animation-delay:3s"/>
  <circle cx="320" cy="200" r="1.1" fill="#C49A3C" class="pt" style="animation-delay:0.5s"/>
  <circle cx="850" cy="220" r="0.7" fill="#4C8752" class="pt" style="animation-delay:2s"/>

  <!-- Isometric 3D cube — left -->
  <g class="f1" filter="url(#shadow3d)" opacity="0.22">
    <g transform="translate(48,105)">
      <polygon points="0,-14 22,-3 22,19 0,8" fill="#2E5F35" opacity="0.8"/>
      <polygon points="0,-14 -22,-3 -22,19 0,8" fill="#1D4623" opacity="0.9"/>
      <polygon points="-22,-3 0,-14 22,-3 0,8" fill="#3D7A45" opacity="0.6"/>
    </g>
  </g>

  <!-- Isometric cube — right -->
  <g class="f3" filter="url(#shadow3d)" opacity="0.18">
    <g transform="translate(855,130)">
      <polygon points="0,-11 17,-2 17,15 0,6" fill="#2E5F35" opacity="0.7"/>
      <polygon points="0,-11 -17,-2 -17,15 0,6" fill="#1D4623" opacity="0.8"/>
      <polygon points="-17,-2 0,-11 17,-2 0,6" fill="#3D7A45" opacity="0.5"/>
    </g>
  </g>

  <!-- 3D Hexagon — floating -->
  <g class="f2" opacity="0.2">
    <g transform="translate(825,50)">
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="#C49A3C" stroke-width="1"/>
      <polygon points="0,-10 9,-5 9,5 0,10 -9,5 -9,-5" fill="#C49A3C" opacity="0.06"/>
    </g>
  </g>

  <!-- 3D Diamond — floating -->
  <g class="f4" opacity="0.16">
    <g transform="translate(170,200)">
      <polygon points="0,-15 15,0 0,15 -15,0" fill="none" stroke="#3D7A45" stroke-width="0.8"/>
      <polygon points="0,-8 8,0 0,8 -8,0" fill="#3D7A45" opacity="0.1"/>
    </g>
  </g>

  <!-- Small 3D triangle -->
  <g class="f1" opacity="0.14">
    <g transform="translate(730,220)">
      <polygon points="0,-12 14,8 -14,8" fill="none" stroke="#C49A3C" stroke-width="0.7"/>
    </g>
  </g>

  <!-- Perspective floor lines -->
  <g opacity="0.04" stroke="#4C8752" stroke-width="0.5">
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="50" y1="260" x2="850" y2="260"/>
    <line x1="100" y1="268" x2="800" y2="268"/>
    <line x1="150" y1="274" x2="750" y2="274"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- 3D TITLE TEXT                   -->
  <!-- ═══════════════════════════════ -->
  <!-- Extrusion shadow layers -->
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="#050A06" dx="5" dy="6" opacity="0.6">PRINCE TAGADIYA</text>
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="#0A130C" dx="4" dy="4.5" opacity="0.4">PRINCE TAGADIYA</text>
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="#0F1E12" dx="3" dy="3" opacity="0.3">PRINCE TAGADIYA</text>
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="#152915" dx="1.5" dy="1.5" opacity="0.2">PRINCE TAGADIYA</text>
  <!-- Main text -->
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="#E8DCC8" filter="url(#textGlow)">PRINCE TAGADIYA</text>
  <!-- Gold shimmer -->
  <text class="name up1" x="450" y="118" text-anchor="middle" fill="url(#goldShimmer)" opacity="0.35">PRINCE TAGADIYA</text>

  <!-- Gold accent line -->
  <g class="up2">
    <line x1="260" y1="134" x2="640" y2="134" stroke="#C49A3C" stroke-width="0.6" opacity="0.35"/>
    <!-- Dot accents on line -->
    <circle cx="260" cy="134" r="1.5" fill="#C49A3C" opacity="0.4"/>
    <circle cx="640" cy="134" r="1.5" fill="#C49A3C" opacity="0.4"/>
    <circle cx="450" cy="134" r="2" fill="#C49A3C" opacity="0.25"/>
  </g>

  <!-- Subtitle -->
  <text class="desc up2" x="450" y="156" text-anchor="middle" fill="#A0997D" opacity="0.9" style="letter-spacing:3px">FOUNDER &amp; CEO, CREATO4</text>

  <!-- Second subtitle -->
  <text class="desc up3" x="450" y="178" text-anchor="middle" fill="#708068" opacity="0.7" style="font-size:11px;letter-spacing:1.5px">EMBEDDED SYSTEMS  ·  HARDWARE ENGINEER  ·  IoT + AI INNOVATOR</text>

  <!-- Bottom edge -->
  <line x1="0" y1="278" x2="900" y2="278" stroke="#1D4623" stroke-width="1" opacity="0.25"/>
</svg>
