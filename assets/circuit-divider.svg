<svg width="900" height="32" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 32">
  <defs>
    <linearGradient id="lineBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E1E14" stop-opacity="0"/>
      <stop offset="20%" stop-color="#1D4623" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#2E5F35" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#1D4623" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0E1E14" stop-opacity="0"/>
    </linearGradient>

    <!-- 3D glow for the traveling pulse -->
    <filter id="pulseGlow" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="0 0 0 0 0.77  0 0 0 0 0.66  0 0 0 0 0.26  0 0 0 0.7 0" result="gold"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="gold"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.3  0 0 0 0 0.55  0 0 0 0 0.25  0 0 0 0.6 0"/>
    </filter>

    <!-- 3D shadow for line -->
    <filter id="lineShadow" x="-2%" y="-20%" width="104%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <style>
      @keyframes nodePulse { 0%,100% { r:2.5; opacity:0.5; } 50% { r:3.5; opacity:0.9; } }
      .node { animation: nodePulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Subtle 3D shadow line beneath -->
  <line x1="60" y1="18" x2="840" y2="18" stroke="#000" stroke-width="2" opacity="0.1" stroke-linecap="round"/>

  <!-- Main circuit line with gradient -->
  <line x1="60" y1="16" x2="840" y2="16" stroke="url(#lineBg)" stroke-width="1" stroke-linecap="round"/>

  <!-- 3D raised circuit nodes -->
  <circle cx="150" cy="16" r="2.5" fill="#2E5F35" class="node" filter="url(#nodeGlow)"/>
  <circle cx="300" cy="16" r="2.5" fill="#2E5F35" class="node" style="animation-delay:0.5s"/>
  <circle cx="450" cy="16" r="3" fill="#C49A3C" class="node" style="animation-delay:1s" filter="url(#nodeGlow)"/>
  <circle cx="600" cy="16" r="2.5" fill="#2E5F35" class="node" style="animation-delay:1.5s"/>
  <circle cx="750" cy="16" r="2.5" fill="#2E5F35" class="node" style="animation-delay:2s" filter="url(#nodeGlow)"/>

  <!-- Small branch lines for circuit feel -->
  <line x1="150" y1="16" x2="150" y2="8" stroke="#1D4623" stroke-width="0.5" opacity="0.35"/>
  <line x1="300" y1="16" x2="300" y2="24" stroke="#1D4623" stroke-width="0.5" opacity="0.35"/>
  <line x1="600" y1="16" x2="600" y2="8" stroke="#1D4623" stroke-width="0.5" opacity="0.35"/>
  <line x1="750" y1="16" x2="750" y2="24" stroke="#1D4623" stroke-width="0.5" opacity="0.35"/>

  <!-- Traveling pulse with 3D glow -->
  <circle r="4" fill="#C49A3C" filter="url(#pulseGlow)">
    <animate attributeName="cx" from="60" to="840" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16;16" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Second pulse (reverse) with delay -->
  <circle r="3" fill="#4C8752" filter="url(#pulseGlow)" opacity="0.5">
    <animate attributeName="cx" from="840" to="60" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="16;16" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
