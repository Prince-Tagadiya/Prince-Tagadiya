<svg width="800" height="100" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060D08"/>
      <stop offset="100%" stop-color="#0E1E14"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AA45"/>
      <stop offset="100%" stop-color="#8A6B22"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <filter id="aS" x="-10%" y="-10%" width="125%" height="135%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="aG" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.83 0 0 0 0 0.67 0 0 0 0 0.27 0 0 0 0.3 0" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes aF1{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes aF2{0%,100%{transform:translateY(-2px)}50%{transform:translateY(3px)}}
      @keyframes shine{0%,100%{opacity:.5}50%{opacity:1}}
      .af1{animation:aF1 4s ease-in-out infinite}
      .af2{animation:aF2 3.5s ease-in-out .5s infinite}
      .af3{animation:aF1 4.5s ease-in-out 1s infinite}
      .sh{animation:shine 3s ease-in-out infinite}
      .at{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
    </style>
  </defs>

  <rect width="800" height="100" fill="url(#aBg)" rx="10"/>

  <!-- Trophy 1: Technovation — GOLD -->
  <g class="af1" filter="url(#aS)">
    <g transform="translate(120,50)">
      <!-- Trophy shape -->
      <path d="M-8,-20 L-12,-20 L-14,-10 Q-14,0 0,5 Q14,0 14,-10 L12,-20 L8,-20" fill="url(#trophy)" opacity="0.8" filter="url(#aG)"/>
      <rect x="-5" y="5" width="10" height="4" rx="1" fill="#C49A3C" opacity="0.6"/>
      <rect x="-8" y="9" width="16" height="3" rx="1" fill="#C49A3C" opacity="0.5"/>
      <!-- #1 -->
      <text x="0" y="-6" text-anchor="middle" fill="#0A160E" font-size="10" font-weight="800" class="at">#1</text>
    </g>
    <text x="120" y="78" text-anchor="middle" class="at" fill="#C49A3C" font-size="8" font-weight="600">Technovation 2026</text>
    <text x="120" y="90" text-anchor="middle" class="at" fill="#708068" font-size="7">National · Rank #1</text>
  </g>

  <!-- Trophy 2: BGI — SILVER -->
  <g class="af2" filter="url(#aS)">
    <g transform="translate(320,50)">
      <path d="M-7,-18 L-10,-18 L-12,-9 Q-12,0 0,4 Q12,0 12,-9 L10,-18 L7,-18" fill="url(#silver)" opacity="0.7" filter="url(#aG)"/>
      <rect x="-4" y="4" width="8" height="3" rx="1" fill="#A0A0A0" opacity="0.5"/>
      <rect x="-7" y="7" width="14" height="3" rx="1" fill="#A0A0A0" opacity="0.4"/>
      <text x="0" y="-5" text-anchor="middle" fill="#0A160E" font-size="9" font-weight="800" class="at">#2</text>
    </g>
    <text x="320" y="78" text-anchor="middle" class="at" fill="#A0A0A0" font-size="8" font-weight="600">BGI Hackathon 2026</text>
    <text x="320" y="90" text-anchor="middle" class="at" fill="#708068" font-size="7">National · 900+ Teams</text>
  </g>

  <!-- Publication badge -->
  <g class="af3" filter="url(#aS)">
    <g transform="translate(510,50)">
      <!-- Book/magazine icon -->
      <rect x="-12" y="-18" width="24" height="30" rx="3" fill="#1A3225" stroke="#4C8752" stroke-width="0.8"/>
      <line x1="-6" y1="-10" x2="6" y2="-10" stroke="#708068" stroke-width="0.6"/>
      <line x1="-6" y1="-5" x2="6" y2="-5" stroke="#708068" stroke-width="0.6"/>
      <line x1="-6" y1="0" x2="4" y2="0" stroke="#708068" stroke-width="0.6"/>
      <text x="0" y="7" text-anchor="middle" fill="#C49A3C" font-size="5" font-weight="700" class="at">EFY</text>
    </g>
    <text x="510" y="78" text-anchor="middle" class="at" fill="#4C8752" font-size="8" font-weight="600">EFY Published</text>
    <text x="510" y="90" text-anchor="middle" class="at" fill="#708068" font-size="7">Electronics For You Mag</text>
  </g>

  <!-- Funding badge -->
  <g class="af1" filter="url(#aS)" style="animation-delay:1.5s">
    <g transform="translate(680,50)">
      <!-- Diamond/gem shape -->
      <polygon points="0,-18 14,-6 0,12 -14,-6" fill="none" stroke="#C49A3C" stroke-width="1" opacity="0.7"/>
      <polygon points="0,-18 7,-6 0,12" fill="#C49A3C" opacity="0.15"/>
      <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#C49A3C" stroke-width="0.5" opacity="0.4"/>
      <text x="0" y="2" text-anchor="middle" fill="#C49A3C" font-size="6" font-weight="700" class="at">₹94K</text>
    </g>
    <text x="680" y="78" text-anchor="middle" class="at" fill="#C49A3C" font-size="8" font-weight="600">SSIP Funded</text>
    <text x="680" y="90" text-anchor="middle" class="at" fill="#708068" font-size="7">2 Government Grants</text>
  </g>

  <!-- Sparkle particles -->
  <circle cx="100" cy="25" r="1" fill="#C49A3C" opacity="0.3" class="sh"/>
  <circle cx="140" cy="30" r="0.8" fill="#C49A3C" opacity="0.2" class="sh" style="animation-delay:1s"/>
  <circle cx="300" cy="28" r="0.8" fill="#A0A0A0" opacity="0.2" class="sh" style="animation-delay:0.5s"/>
  <circle cx="340" cy="22" r="1" fill="#A0A0A0" opacity="0.15" class="sh" style="animation-delay:1.5s"/>
  <circle cx="660" cy="25" r="0.8" fill="#C49A3C" opacity="0.2" class="sh" style="animation-delay:2s"/>
  <circle cx="700" cy="20" r="1" fill="#C49A3C" opacity="0.15" class="sh" style="animation-delay:0.8s"/>
</svg>
