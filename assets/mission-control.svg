<svg width="800" height="110" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110">
  <defs>
    <linearGradient id="mcBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080F0B"/>
      <stop offset="100%" stop-color="#0E1E14"/>
    </linearGradient>

    <!-- Card surface -->
    <linearGradient id="mcCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3225"/>
      <stop offset="100%" stop-color="#0F2218"/>
    </linearGradient>

    <!-- 3D shadow for each card -->
    <filter id="mcShadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Number glow -->
    <filter id="mcNumGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.77  0 0 0 0 0.6  0 0 0 0 0.23  0 0 0 0.3 0" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes countFade { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
      .stat { font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
      .cf1 { animation: countFade 0.6s ease-out 0.3s both; }
      .cf2 { animation: countFade 0.6s ease-out 0.5s both; }
      .cf3 { animation: countFade 0.6s ease-out 0.7s both; }
      .cf4 { animation: countFade 0.6s ease-out 0.9s both; }
    </style>
  </defs>

  <rect width="800" height="110" fill="url(#mcBg)" rx="8"/>

  <!-- Card 1: Hackathon Wins -->
  <g filter="url(#mcShadow)" class="cf1">
    <rect x="20" y="15" width="175" height="80" rx="10" fill="url(#mcCard)" stroke="#2E5F35" stroke-width="0.6"/>
    <rect x="20" y="15" width="175" height="18" rx="10" fill="#1D4623" opacity="0.3"/>
    <rect x="20" y="28" width="175" height="5" fill="#1D4623" opacity="0.3"/>
    <text x="108" y="55" text-anchor="middle" class="stat" fill="#C49A3C" font-size="22" font-weight="800" filter="url(#mcNumGlow)">2</text>
    <text x="108" y="74" text-anchor="middle" class="stat" fill="#708068" font-size="9">Hackathon Wins</text>
    <text x="108" y="86" text-anchor="middle" class="stat" fill="#4C8752" font-size="7" opacity="0.6">National Level</text>
  </g>

  <!-- Card 2: SSIP Funding -->
  <g filter="url(#mcShadow)" class="cf2">
    <rect x="212" y="15" width="175" height="80" rx="10" fill="url(#mcCard)" stroke="#2E5F35" stroke-width="0.6"/>
    <rect x="212" y="15" width="175" height="18" rx="10" fill="#1D4623" opacity="0.3"/>
    <rect x="212" y="28" width="175" height="5" fill="#1D4623" opacity="0.3"/>
    <text x="300" y="55" text-anchor="middle" class="stat" fill="#C49A3C" font-size="20" font-weight="800" filter="url(#mcNumGlow)">₹94K</text>
    <text x="300" y="74" text-anchor="middle" class="stat" fill="#708068" font-size="9">SSIP Funded</text>
    <text x="300" y="86" text-anchor="middle" class="stat" fill="#4C8752" font-size="7" opacity="0.6">Across 2 Grants</text>
  </g>

  <!-- Card 3: Publications -->
  <g filter="url(#mcShadow)" class="cf3">
    <rect x="404" y="15" width="175" height="80" rx="10" fill="url(#mcCard)" stroke="#2E5F35" stroke-width="0.6"/>
    <rect x="404" y="15" width="175" height="18" rx="10" fill="#1D4623" opacity="0.3"/>
    <rect x="404" y="28" width="175" height="5" fill="#1D4623" opacity="0.3"/>
    <text x="492" y="55" text-anchor="middle" class="stat" fill="#C49A3C" font-size="22" font-weight="800" filter="url(#mcNumGlow)">1</text>
    <text x="492" y="74" text-anchor="middle" class="stat" fill="#708068" font-size="9">Publication</text>
    <text x="492" y="86" text-anchor="middle" class="stat" fill="#4C8752" font-size="7" opacity="0.6">Electronics For You</text>
  </g>

  <!-- Card 4: Projects Shipped -->
  <g filter="url(#mcShadow)" class="cf4">
    <rect x="596" y="15" width="175" height="80" rx="10" fill="url(#mcCard)" stroke="#2E5F35" stroke-width="0.6"/>
    <rect x="596" y="15" width="175" height="18" rx="10" fill="#1D4623" opacity="0.3"/>
    <rect x="596" y="28" width="175" height="5" fill="#1D4623" opacity="0.3"/>
    <text x="684" y="55" text-anchor="middle" class="stat" fill="#C49A3C" font-size="22" font-weight="800" filter="url(#mcNumGlow)">13+</text>
    <text x="684" y="74" text-anchor="middle" class="stat" fill="#708068" font-size="9">Projects Shipped</text>
    <text x="684" y="86" text-anchor="middle" class="stat" fill="#4C8752" font-size="7" opacity="0.6">End-to-End Builds</text>
  </g>
</svg>
